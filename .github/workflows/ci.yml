name: CI

# Puerta de calidad: nada llega a main sin pasar formato, lint, tipos, tests, audit y build.
# Antes de esto, esos scripts solo corrían si alguien se acordaba (ver docs/auditoria-cimientos-2026-07.md, C3).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Instalar dependencias (lockfile exacto)
        run: npm ci

      - name: Formato (prettier)
        run: npm run format:check

      - name: Lint (sin warnings)
        run: npm run lint

      - name: Tipos
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Vulnerabilidades (alto/crítico)
        run: npm audit --audit-level=high

      - name: Build de producción
        run: npm run build
